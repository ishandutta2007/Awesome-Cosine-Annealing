<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0f0b29" />
      <stop offset="100%" stop-color="#05020c" />
    </linearGradient>

    <!-- Glowing Line Gradients -->
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="50%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <!-- Ambient Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtitle Glow -->
    <filter id="glow-light" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Styles for Animations -->
    <style>
      @keyframes gradient-shift {
        0% { stop-color: #ff007f; }
        50% { stop-color: #00f0ff; }
        100% { stop-color: #ff007f; }
      }
      @keyframes wave-flow {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -100; }
      }
      @keyframes pulse {
        0% { opacity: 0.7; }
        50% { opacity: 1.0; }
        100% { opacity: 0.7; }
      }
      .glowing-wave {
        stroke: url(#wave-grad);
        stroke-width: 5;
        fill: none;
        stroke-dasharray: 20 10;
        animation: wave-flow 4s linear infinite;
      }
      .glowing-wave-back {
        stroke: url(#wave-grad);
        stroke-width: 8;
        fill: none;
        opacity: 0.4;
        filter: url(#glow);
      }
      .title-text {
        font-family: 'Outfit', 'Inter', sans-serif;
        font-weight: 800;
        fill: #ffffff;
        font-size: 56px;
        letter-spacing: 2px;
        animation: pulse 3s ease-in-out infinite;
      }
      .subtitle-text {
        font-family: 'Outfit', 'Inter', sans-serif;
        font-weight: 400;
        fill: #00f0ff;
        font-size: 18px;
        letter-spacing: 6px;
        opacity: 0.9;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Grid Pattern Overlay for Tech Aesthetic -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" />
    </pattern>
    <rect width="1200" height="400" fill="url(#grid)" />
  </g>

  <!-- Cosine Wave Background Shapes -->
  <g transform="translate(0, 200)">
    <!-- Mathematical Cosine Waves: y = cos(x) -->
    <!-- Wave 1 (Blurred Glow) -->
    <path class="glowing-wave-back" d="M 0 0 C 150 -150, 300 150, 450 0 C 600 -150, 750 150, 900 0 C 1050 -150, 1200 150, 1350 0" />
    <!-- Wave 2 (Animated Foreground) -->
    <path class="glowing-wave" d="M 0 0 C 150 -150, 300 150, 450 0 C 600 -150, 750 150, 900 0 C 1050 -150, 1200 150, 1350 0" />
  </g>

  <!-- Title & Branding -->
  <g transform="translate(600, 180)" text-anchor="middle">
    <!-- Drop Shadow / Glow for Title -->
    <text class="title-text" filter="url(#glow)">AWESOME COSINE ANNEALING</text>
    <!-- Subtitle -->
    <text y="60" class="subtitle-text" filter="url(#glow-light)">CURATED STATE-OF-THE-ART LR SCHEDULERS</text>
  </g>

  <!-- Corner Details/Decorations -->
  <rect x="30" y="30" width="20" height="2" fill="#ff007f" />
  <rect x="30" y="30" width="2" height="20" fill="#ff007f" />
  <rect x="1150" y="30" width="20" height="2" fill="#00f0ff" />
  <rect x="1168" y="30" width="2" height="20" fill="#00f0ff" />
  <rect x="30" y="350" width="2" height="20" fill="#00f0ff" />
  <rect x="30" y="368" width="20" height="2" fill="#00f0ff" />
  <rect x="1168" y="350" width="2" height="20" fill="#ff007f" />
  <rect x="1150" y="368" width="20" height="2" fill="#ff007f" />
</svg>
